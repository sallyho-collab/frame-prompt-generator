<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>包框 Prompt 產生器 — 好食課</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F4721B;
  --orange-dim:#fde8d8;
  --orange-mid:#f9b088;
  --bg:#f5f5f4;
  --surface:#ffffff;
  --surface2:#fafaf9;
  --border:#e5e5e3;
  --border-strong:#d4d4d0;
  --text:#111110;
  --text-2:#6b6b67;
  --text-3:#a8a8a3;
  --r:7px;
  --r-lg:10px;
  --red:#dc2626;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}

header{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:10px;height:52px;position:sticky;top:0;z-index:100}
.logo{width:26px;height:26px;background:var(--orange);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:14px;height:14px;fill:white}
header h1{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.ver{font-size:11px;color:var(--text-3);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin-left:2px}
.spacer{flex:1}
.hint{font-size:11.5px;color:var(--text-3)}

.page{max-width:660px;margin:0 auto;padding:24px 20px 60px}

.group{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px}
.group-header{padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:8px}
.group-title{font-size:12px;font-weight:600;color:var(--text)}
.group-sub{font-size:11px;color:var(--text-3);margin-left:auto}
.group-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}

.sec{display:flex;flex-direction:column;gap:5px}
.sl{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase}

.seg{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:2px}
.seg button{flex:1;padding:5px 4px;font-size:12px;background:none;border:none;cursor:pointer;color:var(--text-2);border-radius:5px;font-family:inherit;transition:all .12s;white-space:nowrap}
.seg button.on{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.07)}

.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:4px 10px;border-radius:99px;font-size:11.5px;border:1px solid var(--border-strong);cursor:pointer;color:var(--text-2);background:var(--surface);transition:all .12s;user-select:none}
.tag:hover{border-color:var(--orange);color:var(--orange)}
.tag.on{background:var(--orange-dim);color:var(--orange);border-color:var(--orange-mid);font-weight:500}

.lbl{font-size:11.5px;color:var(--text-2);display:block;margin-bottom:3px}
input[type=text]{width:100%;min-width:0;font-size:13px;border-radius:var(--r);padding:7px 10px;border:1px solid var(--border-strong);background:var(--surface2);color:var(--text);outline:none;font-family:inherit;transition:border-color .12s}
input[type=text]:focus{border-color:var(--orange);background:var(--surface);box-shadow:0 0 0 3px rgba(244,114,27,.08)}
input[type=text]::placeholder{color:var(--text-3)}
.r2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}

.lv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lv-card{border:1.5px solid var(--border);border-radius:var(--r-lg);padding:12px 8px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--surface)}
.lv-card:hover{border-color:var(--orange-mid)}
.lv-card.on{border-color:var(--orange);background:var(--orange-dim)}
.lv-thumb{width:52px;height:52px;border-radius:5px;overflow:hidden;border:1px solid var(--border)}
.lv-lbl{font-size:11px;color:var(--text-2);text-align:center;line-height:1.4}
.lv-card.on .lv-lbl{color:var(--orange);font-weight:500}

.cm-row{display:flex;gap:6px}
.cm-btn{flex:1;padding:7px 8px;border-radius:var(--r);font-size:12px;border:1px solid var(--border-strong);cursor:pointer;background:var(--surface);color:var(--text-2);text-align:center;transition:all .12s;font-family:inherit}
.cm-btn.on{background:var(--orange-dim);color:var(--orange);border-color:var(--orange);font-weight:500}
.auto-note{font-size:11.5px;color:var(--text-2);background:var(--orange-dim);border:1px solid var(--orange-mid);border-radius:var(--r);padding:8px 10px;line-height:1.6}
.swatches{display:flex;flex-wrap:wrap;gap:5px}
.sw{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 6px;border-radius:99px;font-size:11.5px;border:1px solid var(--border-strong);cursor:pointer;color:var(--text-2);background:var(--surface);transition:all .12s;user-select:none}
.sw:hover{border-color:var(--orange);color:var(--orange)}
.sw.on{border-color:var(--orange);background:var(--orange-dim);color:var(--orange);font-weight:500}
.sw-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* ── Layer system ── */
.layers-wrap{display:flex;flex-direction:column;gap:8px}
.drag-handle{display:flex;flex-direction:column;gap:2.5px;padding:4px 3px;cursor:grab;flex-shrink:0;opacity:.35;transition:opacity .12s}
.drag-handle:hover{opacity:.7}
.drag-handle:active{cursor:grabbing}
.drag-handle span{display:block;width:14px;height:1.5px;background:var(--text-2);border-radius:1px}
.layer-card.dragging{opacity:.4;border:1.5px dashed var(--orange);background:var(--orange-dim)}
.layer-card.drag-over{border-color:var(--orange);box-shadow:0 0 0 2px var(--orange-dim)}

.layer-card{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--surface)}
.layer-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border-bottom:1px solid var(--border)}
.layer-badge{min-width:22px;height:22px;border-radius:6px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;padding:0 4px}
.layer-info{flex:1;min-width:0}
.layer-name{font-size:12px;font-weight:600;color:var(--text)}
.layer-sub{font-size:10.5px;color:var(--text-3)}
.layer-body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}

/* Priority */
.pri-row{display:flex;gap:4px;flex-shrink:0}
.pri-btn{flex:1;padding:5px 3px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid;font-family:inherit;transition:all .12s;text-align:center;line-height:1.3;white-space:nowrap}
.pri-high{background:var(--surface);border-color:var(--border-strong);color:var(--text-3)}
.pri-high.on{background:var(--orange);border-color:var(--orange);color:white}
.pri-mid{background:var(--surface);border-color:var(--border-strong);color:var(--text-3)}
.pri-mid.on{background:var(--orange-dim);border-color:var(--orange);color:var(--orange)}
.pri-low{background:var(--surface);border-color:var(--border-strong);color:var(--text-3)}
.pri-low.on{background:var(--bg);border-color:var(--border-strong);color:var(--text-2)}

/* Add / Remove buttons */
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:8px;border-radius:var(--r);border:1.5px dashed var(--border-strong);background:none;color:var(--text-3);font-size:12px;font-family:inherit;cursor:pointer;transition:all .12s}
.add-btn:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-dim)}
.remove-btn{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;border:1px solid var(--border-strong);background:none;color:var(--text-3);cursor:pointer;transition:all .12s;flex-shrink:0;font-size:14px;line-height:1}
.remove-btn:hover{border-color:var(--red);color:var(--red);background:#fef2f2}

/* Output */
.output-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px}
.output-header{padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.output-title{font-size:12px;font-weight:600;color:var(--text)}
.layer-flow{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text-3);flex-wrap:wrap}
.output-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface2)}
.output-tab{flex:1;padding:9px 8px;font-size:11.5px;font-weight:500;text-align:center;cursor:pointer;border:none;background:none;color:var(--text-3);font-family:inherit;transition:all .12s;border-bottom:2px solid transparent;line-height:1.3}
.output-tab:hover{color:var(--text-2)}
.output-tab.on{color:var(--orange);border-bottom-color:var(--orange);background:var(--surface)}
.tab-desc{font-size:11px;color:var(--text-3);padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--border);line-height:1.5}
.output-body{padding:16px;font-family:'SF Mono','Fira Code','Menlo',monospace;font-size:12px;color:var(--text);line-height:1.85;white-space:pre-wrap;word-break:break-word;min-height:160px}
.output-body.ph{color:var(--text-3);font-family:inherit;font-size:13px;font-style:italic;line-height:1.6}
.output-footer{padding:10px 16px;border-top:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.cct{font-size:11px;color:var(--text-3)}
.btns{display:flex;gap:6px}

.btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--border-strong);background:var(--surface);color:var(--text-2);font-family:inherit;transition:all .12s}
.btn:hover{background:var(--bg)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn.primary{background:var(--orange);color:white;border-color:var(--orange)}
.btn.primary:hover{background:#d9620f}
.btn.success{background:#dcfce7;color:#15803d;border-color:#86efac}
</style>
</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 16 16"><path d="M8 2L10.5 7H13.5L11 10L12 14L8 11.5L4 14L5 10L2.5 7H5.5Z"/></svg></div>
  <h1>包框 Prompt 產生器</h1>
  <span class="ver">好食課內部工具</span>
  <div class="spacer"></div>
  <span class="hint">選完參數 → 複製下方 Prompt → 貼入 ChatGPT</span>
</header>

<div class="page">

  <!-- 版型 -->
  <div class="group">
    <div class="group-header"><span class="group-title">版型與影片區</span></div>
    <div class="group-body">
      <div class="sec">
        <label class="sl">影片與包框配置</label>
        <div class="lv-grid">
          <div class="lv-card on" onclick="setLayout('top-bottom',this)">
            <div class="lv-thumb" style="display:flex;flex-direction:column">
              <div style="background:#00b140;flex:3"></div>
              <div style="background:#F4721B;flex:2;display:flex;align-items:center;justify-content:center;font-size:7px;color:white;font-weight:700">品牌框</div>
            </div>
            <span class="lv-lbl">上影片 · 下包框</span>
          </div>
          <div class="lv-card" onclick="setLayout('left-right',this)">
            <div class="lv-thumb" style="display:flex;flex-direction:row">
              <div style="background:#00b140;flex:3"></div>
              <div style="background:#F4721B;flex:2;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:700">品</div>
            </div>
            <span class="lv-lbl">左影片 · 右包框</span>
          </div>
        </div>
      </div>
      <div class="sec">
        <label class="sl">影片底色</label>
        <div class="seg" id="bg-seg">
          <button class="on" onclick="pick(this,'bgColor','green')">綠幕</button>
          <button onclick="pick(this,'bgColor','blue')">藍幕</button>
        </div>
      </div>
      <div class="sec">
        <label class="sl">區塊交界設計</label>
        <div class="tags">
          <span class="tag on" onclick="togTag(this,'borderStyle','柔和弧形切面')">弧形切面</span>
          <span class="tag" onclick="togTag(this,'borderStyle','斜切流線設計')">斜切流線</span>
          <span class="tag" onclick="togTag(this,'borderStyle','液態波浪感')">液態波浪</span>
          <span class="tag" onclick="togTag(this,'borderStyle','局部破窗式重疊')">破窗重疊</span>
          <span class="tag" onclick="togTag(this,'borderStyle','緞帶弧形包覆感')">緞帶弧形</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 風格 -->
  <div class="group">
    <div class="group-header"><span class="group-title">整體風格</span></div>
    <div class="group-body">
      <div class="sec">
        <label class="sl">氛圍</label>
        <div class="seg" id="vibe-seg">
          <button class="on" onclick="pick(this,'vibe','品牌')">品牌感</button>
          <button onclick="pick(this,'vibe','促銷')">強促銷</button>
          <button onclick="pick(this,'vibe','精品')">精品禮盒</button>
        </div>
      </div>
      <div class="sec">
        <label class="sl">品牌色系</label>
        <div class="cm-row">
          <button class="cm-btn on" id="cm-auto" onclick="setColorMode('auto')">依包裝自動判斷</button>
          <button class="cm-btn" id="cm-custom" onclick="setColorMode('custom')">自訂色系</button>
        </div>
        <div id="color-auto-note" class="auto-note">AI 將根據你提供的產品包裝圖，自動判斷主色與輔助色延伸設計整體配色。</div>
        <div id="color-custom-area" style="display:none;flex-direction:column;gap:8px">
          <p style="font-size:11.5px;color:var(--text-2)">快選預設色系：</p>
          <div class="swatches">
            <div class="sw" onclick="pickSwatch(this,'橘杏蜜桃系：蜜桃杏色、柔和珊瑚橘、暖金色、珍珠白')"><span class="sw-dot" style="background:linear-gradient(135deg,#F5A97A,#F2C97A)"></span>橘杏蜜桃</div>
            <div class="sw" onclick="pickSwatch(this,'清新綠白系：草綠、黃綠、淺綠白、自然米白')"><span class="sw-dot" style="background:linear-gradient(135deg,#7BC67A,#C8E6A0)"></span>清新綠白</div>
            <div class="sw" onclick="pickSwatch(this,'深紅金系：深紅、酒紅、暖金、香檳金、珍珠白')"><span class="sw-dot" style="background:linear-gradient(135deg,#8B1A1A,#C9963A)"></span>深紅金系</div>
            <div class="sw" onclick="pickSwatch(this,'深邃金黑系：深墨、暖金、奶油白')"><span class="sw-dot" style="background:linear-gradient(135deg,#222,#C9963A)"></span>金黑奢華</div>
            <div class="sw" onclick="pickSwatch(this,'純淨白系：純白、微珍珠光澤、淺冰藍、銀灰')"><span class="sw-dot" style="background:linear-gradient(135deg,#eee,#D0E8F5)"></span>純淨白系</div>
            <div class="sw" onclick="pickSwatch(this,'莫蘭迪粉系：灰粉、霧玫瑰、米白、淺灰')"><span class="sw-dot" style="background:linear-gradient(135deg,#D4A5A0,#E8DDD5)"></span>莫蘭迪粉</div>
          </div>
          <div class="sec">
            <label class="lbl">或手動填入色系描述</label>
            <input type="text" id="custom-color" placeholder="例：湖水藍、銀白、淡金色流線" oninput="rebuild()">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 資訊架構 -->
  <div class="group">
    <div class="group-header">
      <span class="group-title">包框資訊架構</span>
      <span class="group-sub">可新增、調整順序或移除每個區塊</span>
    </div>
    <div class="group-body">
      <div class="layers-wrap" id="layers-wrap"></div>
      <button class="add-btn" onclick="showAddMenu()">
        <svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新增資訊區塊
      </button>
      <div id="add-menu" style="display:none;flex-wrap:wrap;gap:5px">
        <button class="tag" onclick="addLayer('offer')">＋ 優惠鉤子</button>
        <button class="tag" onclick="addLayer('trust')">＋ 信任背書</button>
        <button class="tag" onclick="addLayer('product')">＋ 產品識別</button>
        <button class="tag" onclick="addLayer('reason')">＋ 購買理由</button>
        <button class="tag" onclick="addLayer('cta')">＋ 行動呼籲</button>
        <button class="tag" onclick="addLayer('custom')">＋ 自訂文字</button>
      </div>
    </div>
  </div>

  <!-- Prompt 預覽 -->
  <div class="output-group">
    <div class="output-header">
      <span class="output-title">生成的 Prompt</span>
      <div class="layer-flow" id="layer-flow"></div>
    </div>
    <div class="output-tabs">
      <button class="output-tab on" onclick="switchTab('full',this)">Step 1 · 完整版</button>
      <button class="output-tab" onclick="switchTab('bg',this)">Step 2 · 無文字底板</button>
      <button class="output-tab" onclick="switchTab('text',this)">Step 3 · 純文字特效</button>
    </div>
    <div class="tab-desc" id="tab-desc">含產品、背景、所有文字的完整包框，用來確認整體效果</div>
    <div class="output-body ph" id="output">新增上方區塊並填入資訊，Prompt 會自動出現在這裡</div>
    <div class="output-footer">
      <span class="cct" id="cct">0 字</span>
      <div class="btns">
        <button class="btn" onclick="resetAll()">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>重置
        </button>
        <button class="btn primary" id="copybtn" onclick="doCopy()">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>複製 Prompt
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const S={layout:'top-bottom',bgColor:'green',borderStyle:'柔和弧形切面',colorMode:'auto',colorScheme:'',vibe:'品牌'};
let layers=[];
let lid=0;

const LAYER_DEF={
  offer:{name:'優惠鉤子',sub:'第一眼抓住人的促銷訊息',defaultPri:'high'},
  trust:{name:'信任背書',sub:'誰推薦、來源、認證',defaultPri:'mid'},
  product:{name:'產品識別',sub:'你是誰、賣什麼',defaultPri:'mid'},
  reason:{name:'購買理由',sub:'為什麼要買你',defaultPri:'mid'},
  cta:{name:'行動呼籲',sub:'引導下單的按鈕感文字',defaultPri:'mid'},
  custom:{name:'自訂區塊',sub:'任何其他文字資訊',defaultPri:'low'},
};

const PL={high:'【強攻 — 主視覺，一眼最搶眼】',mid:'【輔助 — 清楚明確的次要重點】',low:'【低調 — 小標籤或輔助識別】'};
const PS={
  high:'請做成整體畫面最醒目的主視覺，超大字體、高對比色塊或特效設計，讓人一眼無法忽視',
  mid:'請做成清楚醒目的重點資訊，使用膠囊框、色塊卡片或標籤設計，有明確視覺層級',
  low:'請以小型標籤、徽章、膠囊框或細緻識別章呈現，輔助而不搶主角'
};
const PDOT={high:'🔴',mid:'🟡',low:'⚪'};

function renderLayers(){
  const wrap=document.getElementById('layers-wrap');
  wrap.innerHTML='';
  layers.forEach((l,i)=>{
    const el=document.createElement('div');
    el.className='layer-card';
    el.dataset.id=l.id;
    el.draggable=true;
    el.innerHTML=layerHTML(l,i);
    el.addEventListener('dragstart',onDragStart);
    el.addEventListener('dragover',onDragOver);
    el.addEventListener('dragleave',onDragLeave);
    el.addEventListener('drop',onDrop);
    el.addEventListener('dragend',onDragEnd);
    wrap.appendChild(el);
  });
  rebuild();
}

function layerHTML(l,i){
  const def=LAYER_DEF[l.type];
  const num=i+1;
  let bodyHTML='';
  const dragHandle=`<div class="drag-handle" title="拖移調整順序"><span></span><span></span><span></span></div>`;

  if(l.type==='offer'){
    const st=l.offerType||'pct';
    bodyHTML=`

function addLayer(type){
  layers.push({id:lid++,type,pri:LAYER_DEF[type].defaultPri});
  document.getElementById('add-menu').style.display='none';
  renderLayers();
}
function removeLayer(id){
  layers=layers.filter(l=>l.id!==id);
  renderLayers();
}
function setLayerProp(id,key,val){
  const l=layers.find(l=>l.id===id);
  if(l) l[key]=val;
  rebuild();
}
function showAddMenu(){
  const m=document.getElementById('add-menu');
  m.style.display=m.style.display==='none'?'flex':'none';
}

function buildLayerText(l,idx){
  const def=LAYER_DEF[l.type];
  const pri=l.pri||def.defaultPri;
  const label=`【第${idx+1}層：${def.name}】${PL[pri]}`;

  if(l.type==='offer'){
    const t=l.offerType||'pct';
    let content='';
    if(t==='pct') content=`「${l.v1||'限時折扣'}」${l.v2?'（截止：'+l.v2+'）':''}`;
    else if(t==='code') content=`「${l.v1||'輸入折扣碼享優惠'}」`;
    else if(t==='price') content=`「${l.v1||'限時優惠價'}」${l.v2?'，搭配「'+l.v2+'」折扣標':''}`;
    return `${label}\n文字內容：${content}\n視覺要求：${PS[pri]}`;
  }
  if(l.type==='trust'){
    return `${label}\n文字內容：「${l.v1||'好食課'}${l.v2||'推薦'}」\n視覺要求：${PS[pri]}，可用徽章、推薦章或識別標籤`;
  }
  if(l.type==='product'){
    return `${label}\n文字內容：「${l.v1||'[產品名稱]'}」\n視覺要求：${PS[pri]}，字體需有品牌感與份量感，可分 2～3 行排版`;
  }
  if(l.type==='reason'){
    const rt=l.reasonType||'slogan';
    let r=`${label}\n`;
    if(rt==='slogan'||rt==='both') r+=`核心訴求：「${l.v1||'[訴求文案]'}」\n`;
    if(rt==='list'&&l.v3) r+=`前綴句：「${l.v3}」\n`;
    if((rt==='list'||rt==='both')&&l.v2){
      const items=l.v2.split('、').filter(Boolean);
      if(items.length) r+=`條列重點：${items.map(x=>'「'+x+'」').join('、')}\n→ 請做成 ${items.length} 個整齊排列的小標籤或條列式設計\n`;
    }
    r+=`視覺要求：${PS[pri]}`;
    return r;
  }
  if(l.type==='cta'){
    return `${label}\n文字內容：「${l.v1||'立即下單'}」\n視覺要求：${PS[pri]}，請做成按鈕式色塊、圓角框或緞帶標籤，明顯但不俗氣`;
  }
  if(l.type==='custom'){
    const name=l.v2?`（${l.v2}）`:'';
    return `${label}${name}\n文字內容：「${l.v1||'[自訂內容]'}」\n視覺要求：${PS[pri]}`;
  }
}

    return;

  const prompt=`請根據提供的產品圖，生成一張 1:1 正方形保健食品短影音包框素材，適合社群短影音封面與影片包框使用。

【畫面版型】
畫面比例：1:1 正方形
${ld}

嚴禁出現：複雜紋理、強烈陰影、明顯漸層、過多光點、雜訊、透明光效干擾。

必須與上一張設計完全一致，只移除所有文字，其餘不變。

【與上一張的差異 — 只改這一點】
✅ 保留：整體版型、色系、背景氛圍、產品位置、所有裝飾元素、弧形邊框、光暈流線

【輸出規格】
1:1 正方形，與上一張相同尺寸`;

${tz}，文字層級與視覺要求如下：

// Drag and drop
let dragSrcId=null;

function onDragStart(e){
  dragSrcId=parseInt(this.dataset.id);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',dragSrcId);
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  if(parseInt(this.dataset.id)!==dragSrcId) this.classList.add('drag-over');
}
function onDragLeave(){
  this.classList.remove('drag-over');
}
function onDrop(e){
  e.preventDefault();
  this.classList.remove('drag-over');
  const targetId=parseInt(this.dataset.id);
  if(targetId===dragSrcId) return;
  const srcIdx=layers.findIndex(l=>l.id===dragSrcId);
  const tgtIdx=layers.findIndex(l=>l.id===targetId);
  const [moved]=layers.splice(srcIdx,1);
  layers.splice(tgtIdx,0,moved);
  renderLayers();
}
function onDragEnd(){
  this.classList.remove('dragging');
  document.querySelectorAll('.layer-card').forEach(c=>c.classList.remove('drag-over'));
  dragSrcId=null;
}

// Init with default layers
setColorMode('auto');
['offer','trust','product','reason'].forEach(t=>addLayer(t));
</script>
